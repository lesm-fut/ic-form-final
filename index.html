<!DOCTYPE html>
<html lang="pt_br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário | Final</title>
</head>
<body>
    <h1>Formulário Simples</h1>
    <form>
        <label>Nome:</label><br />
        <input type="text" title="name" required /><br /><br />

        <label>Email:</label><br />
        <input type="email" title="email" required /><br /><br />

        <label>Senha:</label><br />
        <input type="password" title="password" required /><br /><br />

        <input type="button" title="Submit" value="Submit" required />
    </form>
    
</body>
</html>
